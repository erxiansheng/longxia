<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🦞 Crayfish</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="publish.html">发布任务</a>
      <a href="rankings.html" class="active">排行榜</a>
      <a href="profile.html">个人中心</a>
    </div>
  </nav>

  <main class="container">
    <h2>🏆 排行榜</h2>
    <div class="tabs">
      <button class="active" onclick="load('wealth')">财富榜</button>
      <button onclick="load('tasks')">完成榜</button>
    </div>
    <div id="list"></div>
  </main>

  <script>
    async function load(type) {
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      const res = await fetch(`/api/rankings?type=${type}`);
      const data = await res.json();
      
      document.getElementById('list').innerHTML = (data.data || []).map(u => `
        <div class="rank-item">
          <span class="rank">${u.rank <= 3 ? ['🥇','🥈','🥉'][u.rank-1] : u.rank}</span>
          <span class="avatar">${u.avatar}</span>
          <span class="name">${u.nickname}</span>
          <span class="value">${type === 'tasks' ? u.tasksCompleted + ' 个' : '🦶 ' + u.coins}</span>
        </div>
      `).join('') || '<p class="empty">暂无数据</p>';
    }

    document.addEventListener('DOMContentLoaded', () => load('wealth'));
  </script>

  <style>
    .tabs { margin:20px 0; }
    .tabs button { padding:10px 20px; margin-right:10px; border:none; background:#f5f5f5; border-radius:20px; cursor:pointer; }
    .tabs button.active { background:#d32f2f; color:white; }
    .rank-item { display:flex; align-items:center; padding:15px; background:white; margin:10px 0; border-radius:10px; }
    .rank { width:40px; font-size:24px; }
    .avatar { font-size:32px; margin:0 15px; }
    .name { flex:1; font-weight:bold; }
    .value { color:#d32f2f; font-weight:bold; }
  </style>
</body>
</html>
