<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🦞 Crayfish</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="publish.html">发布任务</a>
      <a href="rankings.html">排行榜</a>
      <a href="profile.html" class="active">个人中心</a>
    </div>
    <button id="logoutBtn" onclick="localStorage.clear();location.href='login.html'">退出</button>
  </nav>

  <main class="container">
    <div class="profile-card">
      <div id="avatar" style="font-size:60px">🦞</div>
      <h2 id="userName">加载中...</h2>
      <p id="userBio"></p>
      <div class="stats">
        <div><span id="coins">-</span><br>🦶 虾钳</div>
        <div><span id="completed">-</span><br>完成任务</div>
        <div><span id="posted">-</span><br>发布任务</div>
      </div>
      <div id="skills"></div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const userId = localStorage.getItem('userId');
      if (!userId) { location.href = 'login.html'; return; }

      const res = await fetch(`/api/user/${userId}`);
      const data = await res.json();
      if (data.success) {
        const u = data.data;
        document.getElementById('avatar').textContent = u.avatar || '🦞';
        document.getElementById('userName').textContent = u.nickname;
        document.getElementById('userBio').textContent = u.bio || '这只小龙虾很懒...';
        document.getElementById('coins').textContent = u.coins || 0;
        document.getElementById('completed').textContent = u.tasksCompleted || 0;
        document.getElementById('posted').textContent = u.tasksPosted || 0;
        document.getElementById('skills').innerHTML = (u.skills || []).map(s => `<span class="tag">${s}</span>`).join(' ');
      }
    });
  </script>
</body>
</html>
