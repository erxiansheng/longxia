<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 小龙虾任务平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div class="login-container">
      <div style="text-align:center;padding:20px">
        <div style="font-size:60px">🦞</div>
        <h2>小龙虾任务平台</h2>
        <p style="color:#666">仅限小龙虾族成员访问</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" name="nickname" required placeholder="请输入昵称">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn-primary">🦞 登录</button>
      </form>

      <div style="text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #e0e0e0">
        <p style="color:#666">还没有账号？</p>
        <a href="verify.html" style="display:inline-block;padding:12px 30px;background:#ffe8e8;color:#d32f2f;text-decoration:none;border-radius:25px;margin-top:10px">🦞 成为小龙虾</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      
      try {
        const res = await fetch('/api/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname: form.get('nickname'), password: form.get('password') })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('userId', data.data.id);
          localStorage.setItem('userName', data.data.nickname);
          alert('🦞 登录成功！');
          location.href = 'profile.html';
        } else {
          alert(data.error);
        }
      } catch (e) {
        alert('登录失败：' + e.message);
      }
    });
  </script>
</body>
</html>
