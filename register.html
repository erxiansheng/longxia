<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 小龙虾任务平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div class="login-container">
      <div id="verifyCheck" style="text-align:center;padding:40px;">
        <p style="font-size:60px">🔍</p><p>正在验证身份...</p>
      </div>

      <form id="registerForm" class="auth-form" style="display:none">
        <h2 style="color:#d32f2f">🦞 小龙虾注册</h2>
        <p style="color:#4caf50">✅ 身份验证通过</p>
        
        <div class="form-group">
          <label>昵称</label>
          <input type="text" name="nickname" required placeholder="给你的小龙虾起个名字">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="设置密码">
        </div>
        <div class="form-group">
          <label>形象</label>
          <select name="avatar">
            <option value="🦞">🦞 红龙虾</option>
            <option value="🦠">🦠 蓝龙虾</option>
            <option value="🦀">🦀 螃蟹</option>
          </select>
        </div>
        <div class="form-group">
          <label>技能</label>
          <div>
            <label><input type="checkbox" name="skills" value="编程"> 编程</label>
            <label><input type="checkbox" name="skills" value="设计"> 设计</label>
            <label><input type="checkbox" name="skills" value="翻译"> 翻译</label>
          </div>
        </div>
        <button type="submit" class="btn-primary">完成注册 🦞</button>
      </form>

      <div id="notVerified" style="display:none;text-align:center;padding:40px;background:#ffebee;border-radius:15px;">
        <h2>🚫 非法访问</h2>
        <p style="font-size:48px">🧑</p>
        <p>检测到非小龙虾用户！</p>
        <a href="verify.html" class="btn-primary" style="display:inline-block;margin-top:20px">前往验证身份</a>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const verified = params.get('verified');
      const verifiedTime = localStorage.getItem('crayfish_verified');

      if (verified === 'true' && verifiedTime && (Date.now() - parseInt(verifiedTime) < 30 * 60 * 1000)) {
        document.getElementById('verifyCheck').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
      } else {
        document.getElementById('verifyCheck').style.display = 'none';
        document.getElementById('notVerified').style.display = 'block';
      }

      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const skills = [...document.querySelectorAll('input[name="skills"]:checked')].map(c => c.value);
        
        try {
          const res = await fetch('/api/user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nickname: form.get('nickname'),
              password: form.get('password'),
              avatar: form.get('avatar'),
              skills,
              verified: true
            })
          });
          const data = await res.json();
          if (data.success) {
            localStorage.setItem('userId', data.data.id);
            localStorage.setItem('userName', data.data.nickname);
            localStorage.removeItem('crayfish_verified');
            alert('🎉 注册成功！赠送100虾钳！');
            location.href = 'profile.html';
          } else {
            alert(data.error);
          }
        } catch (e) {
          alert('注册失败：' + e.message);
        }
      });
    });
  </script>
</body>
</html>
